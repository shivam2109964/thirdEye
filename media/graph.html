<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline';" />
    <title>ThirdEye Execution Tree</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 0;
            background: #0a0c10;
            color: #e2e8f0;
            font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
            font-size: 12px;
            line-height: 1.4;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            flex: 0 0 auto;
            padding: 10px 14px 8px;
            border-bottom: 1px solid #1e293b;
            background: #0a0c10;
        }
        .header-row {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
        }
        .header-left {
            flex: 1;
            min-width: 0;
        }
        .mode-toggle {
            flex: 0 0 auto;
            display: flex;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #0f172a;
            overflow: hidden;
        }
        .mode-btn {
            margin: 0;
            padding: 6px 12px;
            font-size: 11px;
            font-weight: 500;
            font-family: system-ui, sans-serif;
            color: #94a3b8;
            background: transparent;
            border: none;
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
        }
        .mode-btn:hover {
            color: #e2e8f0;
            background: rgba(51, 65, 85, 0.5);
        }
        .mode-btn.active {
            color: #f1f5f9;
            background: #334155;
        }
        h1 {
            margin: 0 0 4px;
            font-size: 14px;
            font-weight: 600;
            color: #f1f5f9;
            font-family: system-ui, sans-serif;
        }
        .meta {
            color: #94a3b8;
            font-size: 11px;
        }
        .legend {
            margin-top: 8px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px 16px;
            font-size: 10px;
            color: #94a3b8;
            font-family: system-ui, sans-serif;
        }
        .legend span { display: inline-flex; align-items: center; gap: 6px; }
        .legend i {
            width: 10px; height: 10px; border-radius: 3px;
            border: 1px solid rgba(255,255,255,0.15);
        }
        /* Palette: primary cyan #00E5FF (functions), secondary purple #BB86FC (classes), tertiary amber #FFC107 (flow) */
        .lg-fn { background: #00E5FF; box-shadow: 0 0 8px rgba(0, 229, 255, 0.45); }
        .lg-class { background: #BB86FC; box-shadow: 0 0 8px rgba(187, 134, 252, 0.45); }
        .lg-circ { background: #f87171; }
        .lg-flow { width: 18px; height: 2px; background: #FFC107; border-radius: 0; border: none; box-shadow: 0 0 6px rgba(255, 193, 7, 0.5); }
        .lg-dash { width: 18px; height: 0; border-top: 2px dashed rgba(255, 193, 7, 0.55); background: transparent; border-radius: 0; }

        .viewport-wrap {
            flex: 1 1 auto;
            position: relative;
            min-height: 0;
            background: #08090d;
        }
        .viewport {
            position: absolute;
            inset: 0;
            overflow: hidden;
            cursor: grab;
            touch-action: none;
        }
        .viewport.panning { cursor: grabbing; }
        .canvas {
            position: absolute;
            left: 0;
            top: 0;
            transform-origin: 0 0;
            will-change: transform;
        }
        .grid-bg {
            position: absolute;
            left: -4000px;
            top: -4000px;
            width: 12000px;
            height: 12000px;
            pointer-events: none;
            z-index: 0;
            background-color: #08090d;
            background-image: radial-gradient(circle, rgba(148, 163, 184, 0.22) 1px, transparent 1px);
            background-size: 18px 18px;
        }
        .edges-svg {
            position: absolute;
            left: 0;
            top: 0;
            overflow: visible;
            pointer-events: none;
            z-index: 1;
        }
        .edges-svg .edge-line {
            fill: none;
            stroke: #FFC107;
            stroke-width: 1.35;
        }
        .edges-svg .edge-line.dashed {
            stroke-dasharray: 5 5;
            stroke: #D4A017;
            opacity: 0.9;
        }
        .edges-svg .edge-line.dim {
            opacity: 0.22;
        }
        .edges-svg .edge-line.hl {
            opacity: 1;
            stroke: #FFD54F;
        }
        .edges-svg .edge-line.hl.direct {
            stroke: #FFECB3;
        }
        .arrowhead {
            fill: #FFC107;
        }
        .arrowhead.hl { fill: #FFD54F; }
        .arrowhead.hl.direct { fill: #FFECB3; }

        .nodes-layer {
            position: absolute;
            left: 0;
            top: 0;
            z-index: 2;
        }
        .g-node {
            position: absolute;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            pointer-events: auto;
            cursor: default;
            box-sizing: border-box;
        }
        .g-node .port {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.2);
            flex-shrink: 0;
        }
        .g-node .label {
            flex-shrink: 0;
            width: max-content;
            max-width: min(28rem, 85vw);
            padding: 10px 14px;
            border-radius: 8px;
            background: rgba(15, 23, 42, 0.88);
            border: 1px solid rgba(148, 163, 184, 0.35);
            color: #e2e8f0;
            text-align: center;
            white-space: normal;
            overflow-wrap: anywhere;
            word-break: normal;
            font-size: 11px;
            line-height: 1.45;
            transition: border-color 0.15s, box-shadow 0.15s, opacity 0.15s;
        }
        .g-node.dim .label,
        .g-node.dim .port { opacity: 0.35; }
        .g-node.hl .label {
            border-color: rgba(148, 163, 184, 0.75);
            box-shadow: 0 0 0 1px rgba(148, 163, 184, 0.3);
        }

        /* Primary — top-level / free functions */
        .g-node.semantic-function .port {
            background: #00E5FF;
            box-shadow: 0 0 14px 4px rgba(0, 229, 255, 0.45);
        }
        .g-node.semantic-function .label {
            color: #84FFFF;
            border-color: rgba(0, 229, 255, 0.5);
        }

        /* Secondary — class methods (Class.method) */
        .g-node.semantic-class .port {
            background: #BB86FC;
            box-shadow: 0 0 14px 4px rgba(187, 134, 252, 0.45);
        }
        .g-node.semantic-class .label {
            color: #E1BEE7;
            border-color: rgba(187, 134, 252, 0.55);
        }

        .g-node.semantic-circular .port { background: #f87171; }
        .g-node.semantic-circular .label { color: #fca5a5; border-color: rgba(248, 113, 113, 0.45); }

        .zoom-hint {
            position: absolute;
            right: 10px;
            bottom: 8px;
            font-size: 10px;
            color: #64748b;
            font-family: system-ui, sans-serif;
            pointer-events: none;
        }

        .symbols {
            flex: 0 0 auto;
            max-height: 28vh;
            overflow: auto;
            padding: 10px 14px;
            border-top: 1px solid #1e293b;
            font-size: 11px;
            color: #94a3b8;
            background: #0a0c10;
        }
        .symbols summary {
            cursor: pointer;
            color: #cbd5e1;
            margin-bottom: 6px;
        }
        .pill {
            display: inline-block;
            margin: 2px 4px 2px 0;
            padding: 2px 6px;
            border-radius: 4px;
            background: #0f172a;
            border: 1px solid #475569;
        }
        .empty {
            color: #94a3b8;
            font-style: italic;
            padding: 24px;
            text-align: center;
        }
        .empty code { font-size: 10px; }

        .panel-stack {
            flex: 1 1 auto;
            min-height: 0;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .panel-graph {
            flex: 1;
            min-height: 0;
            flex-direction: column;
        }
        /* Must win over .panel-graph so only one view is visible (avoid flex overriding [hidden]). */
        .panel-graph[hidden] {
            display: none !important;
        }
        .panel-graph:not([hidden]) {
            display: flex;
        }
        .project-scroll {
            flex: 1 1 auto;
            min-height: 0;
            overflow: auto;
            position: relative;
            background: #08090d;
        }
        .grid-bg--project {
            z-index: 0;
        }
        .tree-view {
            position: relative;
            z-index: 1;
            padding: 20px 22px 32px;
            font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
            font-size: 12px;
            line-height: 1.55;
        }
        .tree-line {
            margin: 0;
            padding: 0;
            white-space: pre;
            color: #cbd5e1;
        }
        .tree-root {
            font-weight: 500;
        }
        .tree-root.tree-line--fn { color: #00E5FF; }
        .tree-root.tree-line--class { color: #BB86FC; }
        .tree-branch {
            color: #64748b;
        }
        .tree-name--fn {
            color: #00E5FF;
        }
        .tree-name--class {
            color: #BB86FC;
        }
        .tree-name--file {
            color: #94a3b8;
        }
        .zoom-hint--muted {
            opacity: 0.85;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-row">
            <div class="header-left">
                <h1 id="viewTitle">Execution tree</h1>
                <div id="entryLine" class="meta"></div>
            </div>
            <div class="mode-toggle" role="tablist" aria-label="Graph or function tree">
                <button type="button" id="btnModeGraph" class="mode-btn active">Graph</button>
                <button type="button" id="btnModeProject" class="mode-btn">Functions</button>
            </div>
        </div>
        <div class="legend" id="legend" hidden>
            <span><i class="lg-fn"></i> Function</span>
            <span><i class="lg-class"></i> Class method</span>
            <span><i class="lg-circ"></i> Circular call</span>
            <span><i class="lg-flow"></i> Call flow</span>
            <span><i class="lg-dash"></i> Indirect / circular flow</span>
        </div>
    </div>
    <div class="panel-stack">
        <div id="panelGraph" class="panel-graph">
            <div class="viewport-wrap">
                <div id="viewport" class="viewport" tabindex="0">
                    <div id="canvas" class="canvas">
                        <div class="grid-bg" aria-hidden="true"></div>
                        <svg id="edgesSvg" class="edges-svg" xmlns="http://www.w3.org/2000/svg"></svg>
                        <div id="nodesLayer" class="nodes-layer"></div>
                    </div>
                </div>
                <div id="zoomHint" class="zoom-hint">Scroll to zoom · Drag to pan</div>
            </div>
        </div>
        <div id="panelProject" class="panel-graph" hidden>
            <div class="project-scroll">
                <div class="grid-bg grid-bg--project" aria-hidden="true"></div>
                <div id="treeView" class="tree-view"></div>
            </div>
            <div class="zoom-hint zoom-hint--muted">Scroll to browse calls</div>
        </div>
    </div>
    <div id="symbolsBlock" class="symbols" hidden></div>

    <script>
(function () {
    /* Horizontal / vertical spacing between tree columns and rows (wider = more room for labels). */
    var H_GAP = 140;
    var V_GAP = 128;
    var MIN_PAD = 80;

    var viewport = document.getElementById('viewport');
    var canvas = document.getElementById('canvas');
    var edgesSvg = document.getElementById('edgesSvg');
    var nodesLayer = document.getElementById('nodesLayer');

    var scale = 1;
    var tx = 0;
    var ty = 0;
    var panning = false;
    var lastX = 0;
    var lastY = 0;
    var hoverId = null;

    var graphNodes = [];
    var graphEdges = [];

    var lastPayload = null;
    var panelGraphEl = document.getElementById('panelGraph');
    var panelProjectEl = document.getElementById('panelProject');
    var btnModeGraph = document.getElementById('btnModeGraph');
    var btnModeProject = document.getElementById('btnModeProject');
    var viewTitleEl = document.getElementById('viewTitle');
    var zoomHintEl = document.getElementById('zoomHint');
    var treeViewEl = document.getElementById('treeView');
    var MODE_KEY = 'thirdeye-view-mode';

    function applyViewMode() {
        var mode = sessionStorage.getItem(MODE_KEY) || 'graph';
        var isGraph = mode === 'graph';
        if (panelGraphEl) {
            panelGraphEl.hidden = !isGraph;
        }
        if (panelProjectEl) {
            panelProjectEl.hidden = isGraph;
        }
        if (btnModeGraph) {
            btnModeGraph.classList.toggle('active', isGraph);
        }
        if (btnModeProject) {
            btnModeProject.classList.toggle('active', !isGraph);
        }
        if (viewTitleEl) {
            viewTitleEl.textContent = isGraph ? 'Execution tree' : 'Function tree';
        }
        if (zoomHintEl) {
            zoomHintEl.style.display = isGraph ? '' : 'none';
        }
        var leg = document.getElementById('legend');
        if (leg) {
            leg.hidden = !isGraph || !lastPayload || !lastPayload.root;
        }
        if (!isGraph) {
            if (lastPayload) {
                renderFunctionTreeView(lastPayload);
            } else if (treeViewEl) {
                treeViewEl.innerHTML =
                    '<p class="empty">Loading function tree…</p>';
            }
        }
    }

    function formatCallLine(node) {
        var label = displayLabel(node);
        var argStr = formatArgs(node.args);
        if (argStr) {
            label += ' (' + argStr + ')';
        }
        if (node.returnValue) {
            label += ' → ' + node.returnValue;
        }
        return label;
    }

    function renderFunctionTreeView(payload) {
        if (!treeViewEl) {
            return;
        }
        if (!payload || !payload.root) {
            treeViewEl.innerHTML =
                '<p class="empty">No call tree to show (parse a file with an entry function).</p>';
            return;
        }
        var rows = buildFunctionAsciiRows(payload.root);
        treeViewEl.innerHTML = rows
            .map(function (row) {
                return '<div class="tree-line">' + row + '</div>';
            })
            .join('');
    }

    function isClassMethodNode(node) {
        if (!node) return false;
        var fn = node.functionName ? String(node.functionName) : '';
        return !!(node.className || fn.indexOf('.') > 0);
    }

    function buildFunctionAsciiRows(rootCall) {
        var out = [];
        var rootSemantic = isClassMethodNode(rootCall) ? 'tree-line--class' : 'tree-line--fn';
        out.push(
            '<span class="tree-root ' +
                rootSemantic +
                '">' +
                escapeHtml(formatCallLine(rootCall)) +
                '</span>',
        );
        if (rootCall.children && rootCall.children.length) {
            walkFunctionRows(rootCall.children, '', out);
        }
        return out;
    }

    function walkFunctionRows(children, prefix, out) {
        for (var i = 0; i < children.length; i++) {
            var last = i === children.length - 1;
            var c = children[i];
            var branch = last ? '\u2514\u2500\u2500 ' : '\u251c\u2500\u2500 ';
            var line = escapeHtml(formatCallLine(c));
            var nameClass = isClassMethodNode(c) ? 'tree-name--class' : 'tree-name--fn';
            out.push(
                '<span class="tree-branch">' +
                    escapeHtml(prefix) +
                    '</span><span class="tree-branch">' +
                    branch +
                    '</span><span class="tree-name ' +
                    nameClass +
                    '">' +
                    line +
                    '</span>',
            );
            if (c.children && c.children.length) {
                walkFunctionRows(c.children, prefix + (last ? '    ' : '\u2502   '), out);
            }
        }
    }

    if (btnModeGraph) {
        btnModeGraph.addEventListener('click', function () {
            sessionStorage.setItem(MODE_KEY, 'graph');
            applyViewMode();
        });
    }
    if (btnModeProject) {
        btnModeProject.addEventListener('click', function () {
            sessionStorage.setItem(MODE_KEY, 'project');
            applyViewMode();
        });
    }

    function applyTransform() {
        canvas.style.transform = 'translate(' + tx + 'px,' + ty + 'px) scale(' + scale + ')';
    }

    function fitGraphToView() {
        var rect = viewport.getBoundingClientRect();
        if (!graphNodes.length) {
            tx = rect.width / 2;
            ty = 40;
            scale = 1;
            applyTransform();
            return;
        }
        var minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
        for (var i = 0; i < graphNodes.length; i++) {
            var n = graphNodes[i];
            var tw = n.tree && n.tree.w;
            var th = n.tree && n.tree.h;
            var hw = (tw || 120) / 2;
            var hh = (th || 44) / 2;
            minX = Math.min(minX, n.x - hw);
            maxX = Math.max(maxX, n.x + hw);
            minY = Math.min(minY, n.y - hh);
            maxY = Math.max(maxY, n.y + hh);
        }
        var gw = maxX - minX || 200;
        var gh = maxY - minY || 100;
        var pad = MIN_PAD;
        var availW = rect.width - pad * 2;
        var availH = rect.height - pad * 2;
        var cx = (minX + maxX) / 2;
        var cy = (minY + maxY) / 2;
        var s = Math.min(availW / gw, availH / gh, 2.5);
        if (!isFinite(s) || s <= 0) s = 1;
        scale = Math.min(s, 2.5);
        tx = rect.width / 2 - cx * scale;
        ty = rect.height / 2 - cy * scale;
        applyTransform();
    }

    viewport.addEventListener('wheel', function (e) {
        e.preventDefault();
        var rect = viewport.getBoundingClientRect();
        var mx = e.clientX - rect.left;
        var my = e.clientY - rect.top;
        var worldX = (mx - tx) / scale;
        var worldY = (my - ty) / scale;
        var delta = e.deltaY > 0 ? 0.92 : 1.09;
        var next = Math.min(2.5, Math.max(0.25, scale * delta));
        scale = next;
        tx = mx - worldX * scale;
        ty = my - worldY * scale;
        applyTransform();
    }, { passive: false });

    viewport.addEventListener('mousedown', function (e) {
        if (e.button !== 0) return;
        panning = true;
        viewport.classList.add('panning');
        lastX = e.clientX;
        lastY = e.clientY;
    });
    window.addEventListener('mouseup', function () {
        panning = false;
        viewport.classList.remove('panning');
    });
    window.addEventListener('mousemove', function (e) {
        if (!panning) return;
        tx += e.clientX - lastX;
        ty += e.clientY - lastY;
        lastX = e.clientX;
        lastY = e.clientY;
        applyTransform();
    });

    function displayLabel(node) {
        var label = node.functionName;
        if (node.className) {
            label = node.className + '.' + label.split('.').pop();
        }
        if (node.objectName) {
            label += ' [' + node.objectName + ']';
        }
        return label;
    }

    function keyFor(node) {
        var base = node.className ? node.className + '.' + node.functionName.split('.').pop() : node.functionName;
        return base;
    }

    function classifyNode(node, isRoot, ancestors, symbols) {
        if (isRoot) return 'root';
        var k = keyFor(node);
        for (var a = 0; a < ancestors.length; a++) {
            if (keyFor(ancestors[a]) === k) return 'circular';
        }
        if (symbols && symbols.classes && symbols.functions) {
            var fn = node.functionName || '';
            var dot = fn.indexOf('.');
            if (dot > 0) {
                var cls = fn.slice(0, dot);
                if (symbols.classes.indexOf(cls) === -1) return 'external';
            }
        }
        return 'internal';
    }

    function collectLayout(node, depth, ancestors, symbols, out) {
        var isRoot = ancestors.length === 0;
        var kind = classifyNode(node, isRoot, ancestors, symbols);
        var nextAncestors = ancestors.concat([node]);
        var id = node.id || 'n-' + out.nodes.length;
        var row = {
            id: id,
            node: node,
            depth: depth,
            kind: kind,
            children: [],
            anc: ancestors.slice()
        };
        out.map[id] = row;
        out.nodes.push(row);
        if (node.children && node.children.length) {
            for (var i = 0; i < node.children.length; i++) {
                var ch = collectLayout(node.children[i], depth + 1, nextAncestors, symbols, out);
                row.children.push(ch);
            }
        }
        return row;
    }

    function subtreeWidth(tree) {
        if (!tree.children.length) return 1;
        var w = 0;
        for (var i = 0; i < tree.children.length; i++) {
            w += subtreeWidth(tree.children[i]);
        }
        return w + (tree.children.length - 1) * 1.25;
    }

    function placeTree(tree, leftUnit, unitW, symbols) {
        var cw = subtreeWidth(tree);
        var cxUnit = leftUnit + (cw * unitW) / 2;
        if (!tree.children.length) {
            tree.x = cxUnit * H_GAP;
            tree.y = tree.depth * V_GAP;
            return;
        }
        var cur = leftUnit;
        for (var i = 0; i < tree.children.length; i++) {
            var ch = tree.children[i];
            var w = subtreeWidth(ch);
            placeTree(ch, cur, unitW, symbols);
            cur += w * unitW + 1.25 * unitW;
        }
        var first = tree.children[0];
        var last = tree.children[tree.children.length - 1];
        tree.x = (first.x + last.x) / 2;
        tree.y = tree.depth * V_GAP;
    }

    function buildGraph(root, symbols) {
        var out = { nodes: [], map: {}, edges: [] };
        if (!root) return out;
        var tree = collectLayout(root, 0, [], symbols, out);
        var unitW = 1;
        placeTree(tree, 0, unitW, symbols);

        var minX = Infinity, maxX = -Infinity;
        var minY = 0, maxY = 0;
        function bounds(t) {
            minX = Math.min(minX, t.x);
            maxX = Math.max(maxX, t.x);
            maxY = Math.max(maxY, t.y);
            for (var i = 0; i < t.children.length; i++) bounds(t.children[i]);
        }
        bounds(tree);
        var offsetX = -((minX + maxX) / 2);

        graphNodes = [];
        graphEdges = [];

        function visit(t, parent) {
            t.x += offsetX;
            var k = keyFor(t.node);
            var circ = false;
            for (var a = 0; a < t.anc.length; a++) {
                if (keyFor(t.anc[a]) === k) { circ = true; break; }
            }
            var el = document.createElement('div');
            var node = t.node;
            var isCircular = t.kind === 'circular';
            var fn = node && node.functionName ? String(node.functionName) : '';
            var isClassCall =
                !isCircular &&
                !!(
                    (node && node.className) ||
                    (fn.indexOf('.') > 0)
                );
            var semantic = isCircular ? 'circular' : isClassCall ? 'class' : 'function';
            el.className = 'g-node semantic-' + semantic;
            el.dataset.id = t.id;
            var port = document.createElement('div');
            port.className = 'port';
            var lab = document.createElement('div');
            lab.className = 'label';
            var text = displayLabel(t.node);
            var argStr = formatArgs(t.node.args);
            if (argStr) text += '\n(' + argStr + ')';
            if (t.node.returnValue) text += '\n→ ' + t.node.returnValue;
            lab.textContent = text;
            el.appendChild(port);
            el.appendChild(lab);
            el.style.left = t.x + 'px';
            el.style.top = t.y + 'px';
            nodesLayer.appendChild(el);

            t.el = el;
            t.w = el.offsetWidth;
            t.h = el.offsetHeight;

            graphNodes.push({ id: t.id, x: t.x, y: t.y, kind: t.kind, el: el, tree: t });

            if (parent) {
                var dashed = circ;
                graphEdges.push({
                    from: parent.id,
                    to: t.id,
                    dashed: dashed,
                    fromPt: { x: parent.x, y: parent.y + 24 },
                    toPt: { x: t.x, y: t.y - 24 }
                });
            }

            for (var i = 0; i < t.children.length; i++) {
                visit(t.children[i], t);
            }
        }
        visit(tree, null);

        requestAnimationFrame(function () {
            for (var i = 0; i < graphNodes.length; i++) {
                var tr = graphNodes[i].tree;
                if (tr.el) {
                    tr.w = tr.el.offsetWidth;
                    tr.h = tr.el.offsetHeight;
                }
            }
            drawEdges();
            fitGraphToView();
            attachNodeHoverHandlers();
        });
    }

    function drawEdges() {
        var pad = 4000;
        edgesSvg.setAttribute('width', pad * 2);
        edgesSvg.setAttribute('height', pad * 2);
        edgesSvg.style.left = -pad + 'px';
        edgesSvg.style.top = -pad + 'px';

        var defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
        var m = document.createElementNS('http://www.w3.org/2000/svg', 'marker');
        m.setAttribute('id', 'arr');
        m.setAttribute('markerWidth', '7');
        m.setAttribute('markerHeight', '7');
        m.setAttribute('refX', '6');
        m.setAttribute('refY', '3.5');
        m.setAttribute('orient', 'auto');
        var poly = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
        poly.setAttribute('points', '0 0, 7 3.5, 0 7');
        poly.setAttribute('class', 'arrowhead');
        m.appendChild(poly);
        defs.appendChild(m);
        edgesSvg.innerHTML = '';
        edgesSvg.appendChild(defs);

        var byId = {};
        for (var i = 0; i < graphNodes.length; i++) byId[graphNodes[i].id] = graphNodes[i];

        for (var e = 0; e < graphEdges.length; e++) {
            var ed = graphEdges[e];
            var a = byId[ed.from];
            var b = byId[ed.to];
            if (!a || !b) continue;
            var ah = (a.tree && a.tree.el) ? a.tree.el.offsetHeight : 48;
            var bh = (b.tree && b.tree.el) ? b.tree.el.offsetHeight : 48;
            var ax = a.x + pad;
            var ay = a.y + ah / 2 + pad;
            var bx = b.x + pad;
            var by = b.y - bh / 2 + pad;

            var midY = (ay + by) / 2;
            var path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            var d = 'M ' + ax + ' ' + ay + ' C ' + ax + ' ' + midY + ', ' + bx + ' ' + midY + ', ' + bx + ' ' + by;
            path.setAttribute('d', d);
            path.setAttribute('data-from', ed.from);
            path.setAttribute('data-to', ed.to);
            path.setAttribute('class', 'edge-line' + (ed.dashed ? ' dashed' : ''));
            path.setAttribute('marker-end', 'url(#arr)');

            edgesSvg.appendChild(path);
        }
    }

    function setHighlight(id) {
        hoverId = id;
        var i;
        for (i = 0; i < graphNodes.length; i++) {
            var gn = graphNodes[i];
            var on = !id || gn.id === id;
            var rel = !id || gn.id === id || isConnected(gn.id, id);
            gn.el.classList.toggle('dim', id && !rel);
            gn.el.classList.toggle('hl', id && on);
        }
        var paths = edgesSvg.querySelectorAll('.edge-line');
        for (i = 0; i < paths.length; i++) {
            var p = paths[i];
            var f = p.getAttribute('data-from');
            var t = p.getAttribute('data-to');
            var eOn = !id || f === id || t === id;
            p.classList.toggle('dim', id && !eOn);
            p.classList.toggle('hl', id && eOn);
            var isDirect = !p.classList.contains('dashed');
            if (id && eOn && isDirect) p.classList.add('direct');
            else p.classList.remove('direct');
        }
    }

    function isConnected(nodeId, hubId) {
        for (var i = 0; i < graphEdges.length; i++) {
            var e = graphEdges[i];
            if (e.from === hubId && e.to === nodeId) return true;
            if (e.to === hubId && e.from === nodeId) return true;
        }
        return false;
    }

    window.addEventListener('message', function (event) {
        render(event.data);
    });

    function render(payload) {
        var entryEl = document.getElementById('entryLine');
        var symBlock = document.getElementById('symbolsBlock');
        var legend = document.getElementById('legend');

        nodesLayer.innerHTML = '';
        edgesSvg.innerHTML = '';
        graphNodes = [];
        graphEdges = [];
        hoverId = null;

        if (!payload || typeof payload !== 'object') {
            entryEl.textContent = '';
            lastPayload = null;
            nodesLayer.innerHTML = '<p class="empty">No data.</p>';
            symBlock.hidden = true;
            applyViewMode();
            return;
        }

        lastPayload = payload;

        entryEl.textContent = payload.entry
            ? 'Entry: ' + payload.entry
            : 'No entry function found.';

        if (!payload.root) {
            nodesLayer.innerHTML = '<p class="empty">No call tree to show.</p>';
        } else {
            buildGraph(payload.root, payload.symbols);
        }

        if (payload.symbols) {
            symBlock.hidden = false;
            symBlock.innerHTML =
                '<details open><summary>Symbols</summary>' +
                section('Files', payload.symbols.files) +
                section('Classes', payload.symbols.classes) +
                section('Functions', payload.symbols.functions) +
                section('Variables', payload.symbols.variables) +
                '</details>';
        } else {
            symBlock.hidden = true;
        }

        applyViewMode();
    }

    function attachNodeHoverHandlers() {
        nodesLayer.querySelectorAll('.g-node').forEach(function (el) {
            el.addEventListener('mouseenter', function () {
                setHighlight(el.dataset.id);
            });
            el.addEventListener('mouseleave', function () {
                setHighlight(null);
            });
        });
    }

    function section(title, items) {
        if (!items || !items.length) {
            return '<div><strong>' + escapeHtml(title) + ':</strong> —</div>';
        }
        var chips = items
            .map(function (x) {
                return '<span class="pill">' + escapeHtml(String(x)) + '</span>';
            })
            .join('');
        return '<div style="margin:6px 0;"><strong>' + escapeHtml(title) + ':</strong> ' + chips + '</div>';
    }

    function escapeHtml(s) {
        return s
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    function formatArgs(args) {
        if (!args || !args.length) {
            return '';
        }
        return args
            .map(function (a) {
                return a.param + '=' + a.value;
            })
            .join(', ');
    }

    window.addEventListener('resize', function () {
        if (panelGraphEl && panelGraphEl.hidden) {
            return;
        }
        for (var i = 0; i < graphNodes.length; i++) {
            var tr = graphNodes[i].tree;
            if (tr && tr.el) {
                tr.w = tr.el.offsetWidth;
                tr.h = tr.el.offsetHeight;
            }
        }
        drawEdges();
        fitGraphToView();
    });

    applyViewMode();
})();
    </script>
</body>
</html>
